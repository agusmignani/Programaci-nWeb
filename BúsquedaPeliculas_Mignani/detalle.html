<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Detalle de Película</title>
</head>
<body>
    <header>
        <h1>Detalle de la Película</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="fav.html">Mis Favoritos</a></li>
                <li><a href="admin.html">Administración</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="detalle-layout">
    
    <section id="contenedor-detalle">
        <h2 id="detalle-titulo">Cargando...</h2>
        <figure><img id="detalle-imagen" src="" alt="Póster"></figure>
        <p id="detalle-descripcion">Cargando...</p>
    </section>

    <section id="seccion-formulario-reseña">
        <h3 id="titulo-form-reseña">Dejá tu Reseña</h3>
        <form id="form-reseña">
            <input type="hidden" id="index-reseña" value="">

            <label>Edad recomendada:</label>
            <input type="number" id="reseña-edad" placeholder="Ej: 13" required min="0">
            <br><br>

            <label>Puntaje / Calificación:</label>
            <select id="reseña-puntaje" required>
                <option value="" disabled selected>-- Seleccioná --</option>
                <option value="Mala">Mala</option>
                <option value="Regular">Regular</option>
                <option value="Buena">Buena</option>
            </select>
            <br><br>

            <label>Tu comentario:</label>
            <input type="text" id="reseña-texto" placeholder="Escribí qué te pareció..." required>
            <br><br>

            <button type="submit" id="btn-form-reseña" style="width: 100%;">Publicar Reseña</button>
        </form>
    </section>

    <section id="seccion-lista-reseñas">
        <h3>Comentarios</h3>
        <ul id="ul-reseñas-interactivas">
            </ul>
    </section>

</main>

    <script src="detalle.js"></script>
</body>
</html>
