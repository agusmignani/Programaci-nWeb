<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Mis Películas Favoritas</title>
</head>
<body>
    <header>
        <h1>Mis Favoritos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="fav.html">Mis Favoritos</a></li>
                <li><a href="admin.html">Administración</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="lista-favoritos">
            <h2>Películas Guardadas</h2>
            <ul id="ul-favoritos"></ul>
        </section>

        <section id="contacto-novedades">
            <h2>Agregar a Favoritos Rápido</h2>
            <p>Seleccioná una película de la lista para añadirla a tus favoritos:</p>
            
            <form id="form-favoritos" action="#" method="POST">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50;">
                    Películas disponibles:
                </label>
                
                <div class="custom-select-container">
                    <div id="custom-select-trigger" class="custom-select-input">-- Elegí una película --</div>
                    <ul id="custom-options-list" class="custom-options-hidden"></ul>
                </div>
                
                <br>
                <button type="submit" style="width: 100%;">Guardar en Favoritos</button>
            </form>
        </section>
    </main>

    <script src="fav.js"></script>
</body>
</html>
