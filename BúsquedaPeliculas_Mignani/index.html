<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Búsqueda de Películas</title>
</head>
<body>
    <header>
        <h1>Buscador de Películas</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="fav.html">Mis Favoritos</a></li>
                <li><a href="admin.html">Administración</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="formulario-busqueda">
            <h2>Buscar Película</h2>
            <form id="form-busqueda" action="#" method="GET">
                <label for="titulo">Título:</label>
                <input type="text" id="titulo" name="titulo" placeholder="Ej: Erreway...">
                <br><br>

                <label>Filtros:</label>
                <input type="checkbox" id="estreno" name="estreno">
                <label for="estreno">Solo estrenos</label>
                <input type="checkbox" id="4k" name="4k">
                <label for="4k">Disponible en 4K</label>
                <br><br>

                <button type="submit">Buscar</button> 
            </form>
        </section>

        <section class="resultados-busqueda">
            <h2>Resultados de Búsqueda</h2>
            <ul id="ul-resultados"></ul>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
